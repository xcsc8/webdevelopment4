<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datum Beheer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <section class="sectie">
        <h2>Datum Synchronisatie</h2>
        <div class="input-group">
            <label for="start">Startdatum:</label>
            <input type="date" id="start">
        </div>
        <div class="input-group">
            <label for="eind">Einddatum (+7 dagen):</label>
            <input type="date" id="eind">
        </div>
    </section>

    <section class="sectie">
        <h2>Lijst Sorteren</h2>
        <div class="controls">
            <button id="sorteerOudNieuw">Oudste eerst</button>
            <button id="sorteerNieuwOud">Nieuwste eerst</button>
        </div>
        <ul id="datumLijst"></ul>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
