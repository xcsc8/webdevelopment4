<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Opdracht Product</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<H1>Opdracht product/H1>
<table>
    <thead>
    <tr>
        <th>Producten</th>
        <th>Prijs</th>
        <th>Aantal</th>
        <th>BTW</th>
        <th>Subtotaal</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td>Product 1</td>
        <td class="Prijs">10.00 Eur</td>
        <td><input type="number" value="0" class="aantal"></td>
        <td class="BTW">6%</td>
        <td class="SubTot1">0.00</td>
    </tr>
    <tr>
        <td>Product 2</td>
        <td class="Prijs">15.00 Eur</td>
        <td><input type="number" value="0" class="aantal"></td>
        <td class="BTW">21%</td>
        <td class="SubTot2">0.00</td>
    </tr>
    <tr>
        <td>Product 3</td>
        <td class="Prijs">12.20 Eur</td>
        <td><input type="number" value="0" class="aantal"></td>
        <td class="BTW">21%</td>
        <td class="SubTot3">0.00</td>
    </tr>
    </tbody>
    <tfoot>
    <tr>
        <th colspan="4">Totaal</th>
        <th class="Eindtotaal">0.00</th>
    </tr>
    </tfoot>
</table>
<input type="button" value="Herbereken" class="herberekenKnop">
<script src="script.js"></script>
</body>
</html>
