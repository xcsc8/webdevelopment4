<!DOCTYPE html>
<html lang="nl">
<head>
    <title>Opdracht Colorpicker</title>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>

<H1>Opdracht Colorpicker</H1>

<div class="alleSliders">
    <div>
        <p>Slider voor <strong>rood</strong>.</p>
        <p>Rood:</p>
        <p class="waardeRood">126</p>
        <input type="range" class="sliderRood" value="126" min="0" max="255">
    </div>
    <div>
        <p>Slider voor <strong>groen</strong>.</p>
        <p>Groen:</p>
        <p class="waardeGroen">126</p>
        <input type="range" class="sliderGroen" value="126" min="0" max="255">
    </div>
    <div>
        <p>Slider voor <strong>blauw</strong>.</p>
        <p>Blauw:</p>
        <p class="waardeBlauw">126</p>
        <input type="range" class="sliderBlauw" value="126" min="0" max="255">
    </div>
</div>

<div class="gekleurdBlok">
    <div>
        <p>Een gekleurd blokje :</p>
        <div class="colorDemo"></div>
    </div>
</div>
<script src="scripts/code.js"></script>
</body>
</html>
