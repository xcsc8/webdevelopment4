<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/style.css">
    <title>Hit an Object</title>
</head>
<body>
<div id="header">
    <h1>Hit an Object</h1>
    <p>Score: <span id="scoreDisplay">0</span></p>
    <button id="startBtn">Start spel</button>
</div>
<div id="playField">
    <img id="target" src="" alt="target">
</div>
<div id="gameOver">
    <div id="gameOverBox">
        <h2>FOUT!</h2>
        <p>Jouw score: <span id="finalScore">0</span></p>
        <button id="restartBtn">Opnieuw spelen</button>
    </div>
</div>
<script src="scripts/code.js"></script>
</body>
</html>
