<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Opdracht 2.8: Invulformulier</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h2>2.8 Opdracht: invulformulier</h2>
<p>Maak onderstaand formulier na, waarbij je verschillende gegevens opvraagt.</p>
<form id="opdrachtForm">
    <fieldset>
        <legend>Persoonlijke informatie</legend>
        <label for="vnaam">Voornaam*:</label>
        <input type="text" id="vnaam" name="vnaam" placeholder="Your first name" autofocus required>
        <br>
        <label for="fnaam">Familienaam*:</label>
        <input type="text" id="fnaam" name="fnaam" placeholder="Your last name" required>
    </fieldset>
    <fieldset>
        <legend>Sport</legend>
        <p>Welke sport beoefen je?</p>
        <div class="row"><input type="checkbox" id="lopen" name="sport"><label for="lopen" class="inline">Lopen</label>
        </div>
        <div class="row"><input type="checkbox" id="zwemmen" name="sport"><label for="zwemmen"
                                                                                 class="inline">Zwemmen</label></div>
        <div class="row"><input type="checkbox" id="roeien" name="sport"><label for="roeien"
                                                                                class="inline">Roeien</label></div>
    </fieldset>
    <fieldset>
        <legend>Communicatievoorkeur</legend>
        <p>Hoe kunnen we je bereiken?</p>
        <div class="row"><input type="radio" id="post" name="contact" value="post"><label for="post" class="inline">Per
            post</label></div>
        <div class="row"><input type="radio" id="email" name="contact" value="email"><label for="email" class="inline">E-mail</label>
        </div>
    </fieldset>
    <fieldset>
        <legend>Favorieten</legend>
        <label for="film">Favoriete film:</label>
        <input type="text" id="film" name="film"><br>
        <label for="quote">Favoriete quote:</label>
        <textarea id="quote" name="quote" placeholder="Schrijf je favoriete quote"></textarea><br>
        <label for="eten">Favoriete eten:</label>
        <select id="eten" name="eten" multiple size="3">
            <option>Hamburger</option>
            <option>Hot-dog</option>
            <option>Pizza</option>
        </select><br>
        <label for="browser">Favoriete browser:</label>
        <input type="text" id="browser" name="browser">
    </fieldset>
    <fieldset>
        <legend>Beveiliging & contact</legend>
        <label for="pwd">Wachtwoord*:</label>
        <input type="password" id="pwd" name="pwd" required><br>
        <label for="mail">E-mailadres:</label>
        <input type="email" id="mail" name="mail" placeholder="Geef je e-mailadres in"><br>
        <label for="url">Favoriete site:</label>
        <input type="url" id="url" name="url" placeholder="Geef de URL van je favoriete">
    </fieldset>
    <fieldset>
        <legend>Extra informatie</legend>
        <label for="getal1">Favoriete getal tussen 1-10:</label>
        <input type="number" id="getal1" min="1" max="10"><br>
        <label for="getal2">Favoriete getal tussen 11-1000:</label>
        <input type="range" id="getal2" min="11" max="1000"> <span id="rangeVal"></span><br>
        <label for="datum">Wanneer ben je geboren?</label>
        <input type="date" id="datum" name="datum"><br>
        <label for="postcode">Belgische postcode*:</label>
        <input type="text" id="postcode" name="postcode" placeholder="1000-9992"
               pattern="^(1[0-9]{3}|[2-8][0-9]{3}|9[0-8][0-9]{2}|99[0-8][0-9]|999[0-2])$" required>
    </fieldset>
    <fieldset>
        <legend>Varia</legend>
        <label for="zoek">Zoeken naar iets:</label>
        <input type="search" id="zoek" name="zoek"><br>
        <label for="kleur">Wat is je lievelingskleur?</label>
        <input type="color" id="kleur" name="kleur" value="#000000"><br>
        <input type="file" name="file">
    </fieldset>
    <input type="submit" value="Submit">
</form>
<script src="script.js"></script>
</body>
</html>
