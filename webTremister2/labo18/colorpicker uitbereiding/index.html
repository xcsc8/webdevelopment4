<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>ColorPicker Uitbreiding</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>

<div id="picker-container">
    <div class="control-group">
        <input type="range" id="redSlider" min="0" max="255" value="128">
        <label>Red <span id="redLabel">128</span></label>
    </div>
    <div class="control-group">
        <input type="range" id="greenSlider" min="0" max="255" value="128">
        <label>Green <span id="greenLabel">128</span></label>
    </div>
    <div class="control-group">
        <input type="range" id="blueSlider" min="0" max="255" value="128">
        <label>Blue <span id="blueLabel">128</span></label>
    </div>

    <div id="mainSwatch"></div>
    <button id="btnSave">Save</button>
</div>

<div id="savedContainer">
</div>

<script src="javascript.js"></script>
</body>
</html>
